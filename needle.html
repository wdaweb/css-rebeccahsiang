<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>針筒</title>
    <style>
      body {
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      /* 針筒管身  */
      .needle-body {
        width: 296px;
        height: 80px;
        border: 2px solid #999;
        background-color: rgba(255, 255, 255, 0.7);
        position: relative;
        background-image: linear-gradient(
          90deg,
          transparent 95%,
          rgba(0, 0, 0, 0.5) 95%
        );
        background-size: 20px 15px;
        background-repeat: repeat-x;
        background-position: 0 0;
        border-radius: 5px;
      }

      /* 藥水部分 (黃色) - 放在管身內 */
      .needle-body::before {
        content: "";
        position: absolute;
        left: 126px;
        top: 0;
        width: 169px;
        height: 78px;
        background-color: rgba(255, 255, 0, 0.3);
        z-index: -1;
      }

      /* 活塞 (黑色區塊) */
      .plunger-head {
        position: absolute;
        left: 111px;
        top: -2px;
        width: 30px;
        height: calc(100% + 4px);
        background-color: #333;
        border-radius: 3px;
      }

      /* 推桿 (細橫桿) */
      .plunger-head::before {
        content: "";
        position: absolute;
        right: 30px;
        top: 50%;
        transform: translateY(-50%);
        width: 175px;
        height: 15px;
        background-color: #bbb;
      }

      /* 尾部按鈕 */
      .plunger-head::after {
        content: "";
        position: absolute;
        left: -179px;
        top: 50%;
        transform: translateY(-50%);
        width: 31px;
        height: 60px;
        background-color: #999;
        border-radius: 5px;
      }

      /* 針頭噴嘴 (右側小凸起) */
      .nozzle {
        position: absolute;
        right: -15px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        height: 30px;
        background-color: #ccc;
        border-radius: 0 3px 3px 0;
      }

      /* 金屬針頭 (極細線) */
      .nozzle::after {
        content: "";
        position: absolute;
        left: 100%;
        top: 50%;
        transform: translateY(-50%);
        width: 80px;
        height: 1px;
        background-color: #666;
      }

      /* 文字 Made in Taiwan */
      .brand {
        position: absolute;
        bottom: 5px;
        left: 10px;
        font-size: 10px;
        color: #aaa;
        font-family: Arial, sans-serif;
        font-weight: bold;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div class="needle-body">
      <div class="plunger-head"></div>
      <div class="nozzle"></div>
      <div class="brand">Made in Taiwan</div>
    </div>
  </body>
</html>
